name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  drift:
    name: copilot/ drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify copilot/ is in sync with claude/
        run: node sync-copilot.mjs --check

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint (pin agreement + frontmatter + heading alignment)
        run: node scripts/lint.mjs

  validate:
    name: openspec validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate reference example
        run: npx --yes @fission-ai/openspec@1.4.1 validate example-greeting
